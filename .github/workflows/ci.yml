name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # O bit executável do gradlew nem sempre sobrevive a commits feitos no
      # Windows — garante que o wrapper roda no runner Linux.
      - run: chmod +x gradlew

      # Suíte completa (unitários + integração via Testcontainers). Diferente
      # da máquina de desenvolvimento local (ver README, seção "Rodando
      # localmente"), o runner ubuntu-latest já tem Docker nativo — sem a
      # camada de compatibilidade do Docker Desktop no Windows que exige
      # Podman como workaround, então não há a flakiness observada localmente.
      - run: ./gradlew test --no-daemon

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/test
          retention-days: 7

  frontend:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
