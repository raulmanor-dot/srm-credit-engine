services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-srm_credit_engine}
      POSTGRES_USER: ${POSTGRES_USER:-srm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srm} -d ${POSTGRES_DB:-srm_credit_engine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-srm_credit_engine}
      DB_USER: ${POSTGRES_USER:-srm}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-srm}
      # Provedor de câmbio mock (ver ADR 0006): a app chama a si mesma via
      # HTTP real em localhost, protegida por Resilience4j. Knobs de caos
      # sobrescrevíveis para demonstrar retry/circuit breaker/fallback.
      APP_MOCK_PROVIDER_FAILURE_RATE: ${FX_MOCK_FAILURE_RATE:-0.2}
      APP_MOCK_PROVIDER_MAX_LATENCY_MS: ${FX_MOCK_MAX_LATENCY_MS:-200}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Observabilidade (ver ADR 0007): scrape de /actuator/prometheus + dashboard
  # provisionado, prontos assim que o compose sobe, sem passos manuais.
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      app:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
