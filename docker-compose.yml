services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-srm_credit_engine}
      POSTGRES_USER: ${POSTGRES_USER:-srm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-srm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-srm} -d ${POSTGRES_DB:-srm_credit_engine}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-srm_credit_engine}
      DB_USER: ${POSTGRES_USER:-srm}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-srm}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
