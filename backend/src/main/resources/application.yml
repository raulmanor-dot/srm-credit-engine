spring:
  application:
    name: srm-credit-engine
  datasource:
    url: jdbc:postgresql://localhost:5432/srm_credit_engine
    username: srm
    password: srm
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.srmasset.creditengine: DEBUG
