spring:
  application:
    name: srm-credit-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:srm_credit_engine}
    username: ${DB_USER:srm}
    password: ${DB_PASSWORD:srm}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.srmasset.creditengine: DEBUG
